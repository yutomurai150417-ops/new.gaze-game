```html
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>段階的視線探索ゲーム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <style>body { touch-action: none; background: #000; }</style>
</head>
<body class="m-0 overflow-hidden font-sans w-screen h-screen text-white">

  <div id="ui-panel" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 bg-white text-slate-900 p-8 rounded-3xl w-11/12 max-w-md shadow-2xl text-center">
    <h1 class="text-xl font-bold mb-4" id="ui-title">iPad 視線探索タスク</h1>
    <div id="input-fields" class="mb-4 text-left">
      <label class="block text-sm font-bold mb-1">症例ID:</label>
      <input type="text" id="case-id" placeholder="症例IDを入力" class="w-full border p-2 rounded mb-4">
      <label class="block text-sm font-bold mb-1">画像選択:</label>
      <input type="file" id="bg-upload" accept="image/*" multiple class="w-full text-sm">
    </div>
    <button id="btn-start" class="w-full bg-slate-600 py-4 rounded-xl text-white font-bold hover:bg-slate-700 cursor-pointer">タスクを開始</button>
    <div id="result-actions" class="hidden mt-4 space-y-2">
        <button id="btn-download-csv" class="w-full bg-green-600 py-3 rounded-xl text-white font-bold hover:bg-green-700 cursor-pointer">CSVダウンロード</button>
        <button id="btn-restart" class="w-full bg-slate-400 py-3 rounded-xl text-white font-bold hover:bg-slate-500 cursor-pointer">もう一度</button>
    </div>
  </div>

  <div id="status" class="absolute top-5 left-5 z-40 text-sm font-mono bg-black/50 p-2 rounded">準備中...</div>
  <canvas id="app-canvas" class="block w-full h-full"></canvas>

  <script>
    // Service Worker 登録
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
      });
    }

    const canvas = document.getElementById('app-canvas');
    const ctx = canvas.getContext('2d');
    let mesh, camera, images = [], currentImg = null, level = 1, isRunning = false, revealed = new Set(), currentTarget = -1, score = 0;
    let cursor = { x: 0.5, y: 0.5 }, baseline = {x: 0, y: 0}, calibrationSamples = [];

    // 初期化関数
    const initMesh = () => {
      mesh = new FaceMesh({ locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
      mesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
      mesh.onResults(results => {
        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
          const lm = results.multiFaceLandmarks[0];
          const rawX = 1 - (lm[159].x + lm[386].x) / 2;
          const rawY = (lm[159].y + lm[386].y) / 2;
          cursor.x += ((0.5 + (rawX - baseline.x) * 20) - cursor.x) * 0.15;
          cursor.y += ((0.5 + (rawY - baseline.y) * 20) - cursor.y) * 0.15;
        }
      });
    };

    const resetTask = () => {
      score = 0; level = 1; revealed.clear(); isRunning = true;
      document.getElementById('ui-panel').style.display = 'none';
      setupLevel();
    };

    function setupLevel() {
      currentImg = images[Math.floor(Math.random() * images.length)];
      currentTarget = Math.floor(Math.random() * 3);
    }

    document.getElementById('bg-upload').onchange = (e) => {
      Array.from(e.target.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.src = ev.target.result;
          images.push(img);
        };
        reader.readAsDataURL(file);
      });
    };

    document.getElementById('btn-start').onclick = async () => {
      if(images.length === 0) return alert("画像を選択してください");
      initMesh();
      const video = document.createElement('video');
      const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
      video.srcObject = stream;
      await video.play();
      camera = new Camera(video, { onFrame: async () => await mesh.send({image: video}) });
      await camera.start();
      
      document.getElementById('status').innerText = "キャリブレーション中...";
      setTimeout(() => {
        isRunning = true;
        document.getElementById('ui-panel').style.display = 'none';
        setupLevel();
      }, 3000);
    };

    document.getElementById('btn-restart').onclick = resetTask;

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (isRunning && currentImg) {
          ctx.drawImage(currentImg, 0, 0, canvas.width, canvas.height);
          ctx.beginPath(); ctx.arc(cursor.x * canvas.width, cursor.y * canvas.height, 20, 0, Math.PI * 2);
          ctx.strokeStyle = "red"; ctx.stroke();
      }
      requestAnimationFrame(draw);
    }
    
    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    draw();
  </script>
</body>
</html>
