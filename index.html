```html
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>段階的視線探索ゲーム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <style>body { touch-action: none; background: #000; }</style>
</head>
<body class="m-0 overflow-hidden font-sans w-screen h-screen text-white">

  <!-- UIパネル -->
  <div id="ui-panel" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-50 bg-white text-slate-900 p-8 rounded-3xl w-11/12 max-w-md shadow-2xl text-center">
    <h1 class="text-xl font-bold mb-4" id="ui-title">iPad 視線探索タスク</h1>
    <div id="input-fields" class="mb-4 text-left">
      <label class="block text-sm font-bold mb-1">症例ID:</label>
      <input type="text" id="case-id" placeholder="症例IDを入力" class="w-full border p-2 rounded mb-4">
      <label class="block text-sm font-bold mb-1">画像選択:</label>
      <input type="file" id="bg-upload" accept="image/*" multiple class="w-full text-sm">
    </div>
    <button id="btn-start" class="w-full bg-slate-600 py-4 rounded-xl text-white font-bold hover:bg-slate-700 cursor-pointer pointer-events-auto">タスクを開始</button>
    <div id="result-actions" class="hidden mt-4 space-y-2">
        <button id="btn-download-csv" class="w-full bg-green-600 py-3 rounded-xl text-white font-bold hover:bg-green-700 cursor-pointer">CSVデータをダウンロード</button>
        <button id="btn-download-video" class="w-full bg-blue-600 py-3 rounded-xl text-white font-bold hover:bg-blue-700 cursor-pointer">視線軌跡動画を保存</button>
        <button id="btn-restart" class="w-full bg-slate-400 py-3 rounded-xl text-white font-bold hover:bg-slate-500 cursor-pointer">もう一度</button>
    </div>
  </div>

  <div id="status" class="absolute top-5 left-5 z-40 text-sm font-mono bg-black/50 p-2 rounded">準備中...</div>
  <div id="score-display" class="absolute top-5 right-5 z-40 text-xl font-bold">スコア: 0</div>
  <div id="timer-display" class="absolute bottom-5 right-5 z-40 text-xl font-bold">残り: 60秒</div>

  <canvas id="app-canvas" class="block w-full h-full"></canvas>
  <canvas id="gaze-record-canvas" class="hidden"></canvas>

  <script>
    // Service Worker 登録（オフライン対応用）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW fail', err));
      });
    }

    class GazeRecorder {
      constructor(canvas) {
        this.stream = canvas.captureStream(30);
        const options = ['video/webm;codecs=vp9', 'video/webm'].find(type => MediaRecorder.isTypeSupported(type)) || 'video/webm';
        this.recorder = new MediaRecorder(this.stream, { mimeType: options });
        this.chunks = [];
        this.recorder.ondataavailable = e => { if (e.data.size > 0) this.chunks.push(e.data); };
      }
      start() { this.recorder.start(); }
      async stop() { 
        return new Promise(resolve => { this.recorder.onstop = resolve; this.recorder.stop(); });
      }
      getBlob() { return new Blob(this.chunks, { type: this.recorder.mimeType }); }
    }

    const canvas = document.getElementById('app-canvas');
    const ctx = canvas.getContext('2d');
    const recordCanvas = document.getElementById('gaze-record-canvas');
    const recordCtx = recordCanvas.getContext('2d');
    
    let recorder = null, particles = [], gazeHistory = [], reactionLogs = [], currentTargetSetTime = 0, dwellPoints = [], timerInterval = null;
    let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(freqs, duration) {
        freqs.forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = f;
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration + i * 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + i * 0.1); osc.stop(audioCtx.currentTime + duration + i * 0.1);
        });
    }

    let images = [], imageQueue = [], currentImg = null, level = 1, isRunning = false, isCalibrating = false, showingCongrats = false;
    let gridRows = 1, gridCols = 3, revealed = new Set(), currentTarget = -1;
    let cursor = { x: 0.5, y: 0.5 }, baseline = {x: 0, y: 0}, calibrationSamples = [];
    let score = 0, startTime, recordStartTimestamp, timeLeft = 60, neonPulse = 0;
    let lookStartTime = 0, lastLookedIdx = -1, areaStats = Array.from({length: 9}, () => ({duration: 0})), lastFrameTime = performance.now();

    function createConfetti() {
        for(let i=0; i<100; i++) particles.push({ x: Math.random() * canvas.width, y: -10, vx: (Math.random() - 0.5) * 10, vy: Math.random() * 5 + 2, color: `hsl(${Math.random()*360}, 100%, 70%)` });
    }

    document.getElementById('bg-upload').onchange = (e) => {
      images = [];
      Array.from(e.target.files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => { const img = new Image(); img.crossOrigin = "anonymous"; img.src = ev.target.result; images.push(img); };
        reader.readAsDataURL(file);
      });
    };

    function triggerRecalibration() {
        isCalibrating = true; calibrationSamples = [];
        document.getElementById('status').innerText = "再キャリブレーション中...";
        setTimeout(() => {
            if(calibrationSamples.length > 0) baseline = {x: calibrationSamples.reduce((a,b) => a+b.x,0)/calibrationSamples.length, y: calibrationSamples.reduce((a,b) => a+b.y,0)/calibrationSamples.length};
            isCalibrating = false; document.getElementById('status').innerText = `レベル: ${level}/4`;
        }, 2000);
    }
    canvas.addEventListener('touchstart', triggerRecalibration);

    function setupLevel() {
      if (imageQueue.length === 0) imageQueue = [...images].sort(() => Math.random() - 0.5);
      currentImg = imageQueue.pop();
      if(level === 1) { gridRows = 1; gridCols = 3; }
      else if(level === 2) { gridRows = 3; gridCols = 1; }
      else if(level === 3) { gridRows = 2; gridCols = 3; }
      else { gridRows = 3; gridCols = 3; }
      revealed.clear(); setNextTarget();
      document.getElementById('status').innerText = `レベル: ${level}/4`;
    }

    function setNextTarget() {
      do { currentTarget = Math.floor(Math.random() * (gridRows * gridCols)); } while (revealed.has(currentTarget));
      currentTargetSetTime = Date.now(); dwellPoints = [];
    }

    async function endGame() {
      isRunning = false; if (timerInterval) clearInterval(timerInterval);
      if (recorder) await recorder.stop();
      document.getElementById('ui-panel').style.display = 'block';
      document.getElementById('input-fields').classList.add('hidden');
      document.getElementById('btn-start').classList.add('hidden');
      document.getElementById('result-actions').classList.remove('hidden');
      document.getElementById('ui-title').innerHTML = `<div class="text-4xl">終了！</div><div class="mt-2 text-2xl font-bold">スコア: ${score}</div>`;
      document.getElementById('btn-download-csv').onclick = () => { /* CSV logic omitted for brevity */ alert("データ保存機能"); };
      document.getElementById('btn-restart').onclick = () => location.reload();
    }

    const mesh = new FaceMesh({ locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
    mesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5});
    mesh.onResults(results => {
      const now = performance.now(); const dt = (now - lastFrameTime) / 1000; lastFrameTime = now;
      if (results.multiFaceLandmarks?.length > 0) {
        const lm = results.multiFaceLandmarks[0];
        const rawX = 1 - (lm[159].x + lm[386].x) / 2;
        const rawY = (lm[159].y + lm[386].y) / 2;
        if (isCalibrating) calibrationSamples.push({x: rawX, y: rawY});
        else if (isRunning && !showingCongrats) {
            cursor.x += ((0.5 + (rawX - baseline.x) * 20) - cursor.x) * 0.15;
            cursor.y += ((0.5 + (rawY - baseline.y) * 20) - cursor.y) * 0.15;
            gazeHistory.push({x: cursor.x * recordCanvas.width, y: cursor.y * recordCanvas.height});
            const idx = Math.floor(cursor.y * gridRows) * gridCols + Math.floor(cursor.x * gridCols);
            if (idx === currentTarget) {
                if (idx === lastLookedIdx && Date.now() - lookStartTime >= 1000 && !revealed.has(idx)) {
                    revealed.add(idx); score += 10;
                    if (revealed.size >= (gridRows * gridCols)) { 
                        showingCongrats = true; setTimeout(() => { level++; level > 4 ? endGame() : setupLevel(); showingCongrats = false; }, 3000); 
                    } else setNextTarget();
                    document.getElementById('score-display').innerText = `スコア: ${score}`;
                } else if (idx !== lastLookedIdx) { lookStartTime = Date.now(); lastLookedIdx = idx; }
            } else { lookStartTime = Date.now(); lastLookedIdx = idx; }
        }
      }
    });

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (isRunning && currentImg && !showingCongrats) {
          const cellW = canvas.width / gridCols, cellH = canvas.height / gridRows;
          for(let i=0; i<gridRows*gridCols; i++) {
            if(revealed.has(i)) ctx.drawImage(currentImg, (i%gridCols)*(currentImg.width/gridCols), Math.floor(i/gridCols)*(currentImg.height/gridRows), currentImg.width/gridCols, currentImg.height/gridRows, (i%gridCols)*cellW, Math.floor(i/gridCols)*cellH, cellW, cellH);
            else { ctx.fillStyle = "black"; ctx.fillRect((i%gridCols)*cellW, Math.floor(i/gridCols)*cellH, cellW, cellH); }
            if(i === currentTarget) { ctx.strokeStyle = "white"; ctx.lineWidth = 10; ctx.strokeRect((i%gridCols)*cellW+5, Math.floor(i/gridCols)*cellH+5, cellW-10, cellH-10); }
          }
      }
      requestAnimationFrame(draw);
    }

    document.getElementById('btn-start').onclick = async () => {
      if(images.length === 0) return alert("画像を選択してください");
      audioCtx.resume(); document.getElementById('ui-panel').style.display = 'none';
      recordCanvas.width = canvas.width; recordCanvas.height = canvas.height;
      recorder = new GazeRecorder(recordCanvas); recorder.start();
      const video = document.createElement('video');
      video.srcObject = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
      await video.play();
      await new Camera(video, { onFrame: async () => await mesh.send({image: video}) }).start();
      isCalibrating = true;
      setTimeout(() => {
        baseline = {x: calibrationSamples.reduce((a,b) => a+b.x,0)/calibrationSamples.length, y: calibrationSamples.reduce((a,b) => a+b.y,0)/calibrationSamples.length};
        isCalibrating = false; isRunning = true; startTime = Date.now(); setupLevel();
        timerInterval = setInterval(() => {
          timeLeft = Math.max(0, 60 - Math.floor((Date.now() - startTime)/1000));
          document.getElementById('timer-display').innerText = `残り: ${timeLeft}秒`;
          if (timeLeft === 0 && isRunning) endGame();
        }, 1000);
      }, 3000);
    };

    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    draw();
  </script>
</body>
</html>
